name: Keep Supabase Awake

on:
  schedule:
    # Runs every 2 days at 12:00 AM UTC
    - cron: "0 0 */2 * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl "${{ secrets.SUPABASE_URL }}/rest/v1/books?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}"
